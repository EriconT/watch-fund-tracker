<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Fund Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Watch Fund">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen p-8 font-sans text-slate-800 dark:text-slate-200 transition-colors duration-200">

    <div class="max-w-5xl mx-auto space-y-8">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 flex justify-between items-center transition-colors duration-200">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Watch Fund Tracker</h1>
                <p class="text-slate-500 dark:text-slate-400 mt-1">Target Date: End of 2026</p>
            </div>
            <div class="flex flex-col items-end space-y-3">
                <div class="flex space-x-2">
                    <button id="forceSyncBtn" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition focus:outline-none" aria-label="Force Sync Data">
                        <svg id="syncIcon" class="w-5 h-5 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>

                    <button id="themeToggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition focus:outline-none" aria-label="Toggle Dark Mode">
                        <svg id="sunIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <svg id="moonIcon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                </div>

                <span id="fileStatus" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-400 transition-colors duration-200">
                    Loading data...
                </span>
            </div>
        </div>

        <div id="dashboard" class="hidden grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="space-y-6 flex flex-col justify-between">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-200">
                    <h2 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Total Saved</h2>
                    <p class="text-4xl font-bold text-emerald-600 dark:text-emerald-500" id="totalSavedText">$0</p>
                </div>
                
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 border-l-4 border-l-red-600 transition-colors duration-200">
                    <h2 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Tudor Remaining</h2>
                    <p class="text-2xl font-bold text-slate-800 dark:text-slate-100" id="tudorCostText">$0</p>
                    <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-2 mt-4 transition-colors duration-200">
                        <div id="tudorProgressBar" class="bg-red-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 border-l-4 border-l-blue-600 transition-colors duration-200">
                    <h2 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Longines Remaining</h2>
                    <p class="text-2xl font-bold text-slate-800 dark:text-slate-100" id="longinesCostText">$0</p>
                    <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-2 mt-4 transition-colors duration-200">
                        <div id="longinesProgressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2 bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 flex flex-col justify-center transition-colors duration-200">
                <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-6">Progress Visualization</h2>
                <div class="relative h-72 w-full">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
            
            <!-- Adding the form UI for new transactions -->
            <div class="md:col-span-3 bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-200">
                <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-4">Add New Savings Entry</h2>
                <form id="addTransactionForm" class="flex flex-col md:flex-row gap-4 items-end">
                    <div class="w-full md:w-1/2">
                        <label for="descInput" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Description</label>
                        <input type="text" id="descInput" required placeholder="e.g. Sold old watch" class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2 text-slate-900 dark:text-slate-100 focus:border-emerald-500 focus:ring-emerald-500 transition-colors duration-200">
                    </div>
                    <div class="w-full md:w-1/4">
                        <label for="amountInput" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Amount ($)</label>
                        <input type="number" id="amountInput" required min="1" step="0.01" placeholder="100.00" class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2 text-slate-900 dark:text-slate-100 focus:border-emerald-500 focus:ring-emerald-500 transition-colors duration-200">
                    </div>
                    <div class="w-full md:w-1/4">
                        <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg shadow-sm transition-colors duration-200 flex justify-center items-center">
                            <span id="submitText">Add Funds</span>
                            <svg id="submitLoading" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>

            <div class="md:col-span-3 bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors duration-200">
                <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-4">Savings Breakdown</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-200 dark:border-slate-700 transition-colors duration-200">
                                <th class="py-3 px-4 font-semibold text-sm text-slate-500 dark:text-slate-400 uppercase">Description</th>
                                <th class="py-3 px-4 font-semibold text-sm text-slate-500 dark:text-slate-400 uppercase text-right">Amount Saved</th>
                                <th class="py-3 px-4 font-semibold text-sm text-slate-500 dark:text-slate-400 uppercase text-right w-24">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transactionTableBody" class="text-slate-700 dark:text-slate-300 divide-y divide-slate-100 dark:divide-slate-800 transition-colors duration-200">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Transaction Modal -->
    <div id="editModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <!-- Background overlay -->
            <div class="fixed inset-0 transition-opacity" aria-hidden="true">
                <div class="absolute inset-0 bg-slate-900/75 dark:bg-slate-950/80 backdrop-blur-sm"></div>
            </div>

            <!-- Modal panel -->
            <div class="inline-block align-bottom bg-white dark:bg-slate-900 rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-md w-full border border-slate-100 dark:border-slate-800">
                <div class="px-6 pt-6 pb-2">
                    <h3 class="text-lg leading-6 font-bold text-slate-900 dark:text-white mb-5" id="modal-title">Edit Transaction</h3>
                    <form id="editTransactionForm" class="space-y-4">
                        <div>
                            <label for="editDescInput" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Description</label>
                            <input type="text" id="editDescInput" required class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2 text-slate-900 dark:text-slate-100 focus:border-blue-500 focus:ring-blue-500 transition-colors duration-200">
                        </div>
                        <div>
                            <label for="editAmountInput" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Amount ($)</label>
                            <input type="number" id="editAmountInput" required min="1" step="0.01" class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2 text-slate-900 dark:text-slate-100 focus:border-blue-500 focus:ring-blue-500 transition-colors duration-200">
                        </div>
                        <div class="pt-4 pb-4 flex justify-end space-x-3">
                            <button type="button" id="closeEditModalBtn" class="px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 font-medium transition-colors">Cancel</button>
                            <button type="submit" id="saveEditBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium shadow-sm flex items-center transition-colors">
                                <span id="saveEditText">Save Changes</span>
                                <svg id="saveEditLoading" class="animate-spin ml-2 h-4 w-4 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        let progressChartInstance = null;
        let chartDataCache = { totalSaved: 0, tudorCost: 0, longinesCost: 0 };
        let currentEditRowIndex = null;

        // Helper: Get colors for Chart based on current theme
        const getChartColors = () => {
            const isDark = document.documentElement.classList.contains('dark');
            return {
                text: isDark ? '#94a3b8' : '#64748b', 
                targetBg: isDark ? '#334155' : '#e2e8f0', 
            };
        };

        // Theme Toggle Logic
        document.getElementById('themeToggle').addEventListener('click', () => {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');

            if (progressChartInstance) {
                updateChart(chartDataCache.totalSaved, chartDataCache.tudorCost, chartDataCache.longinesCost);
            }
        });

        const getNumericValue = (data, rowIndex, colIndex) => {
            if (data[rowIndex] && data[rowIndex][colIndex] !== undefined && data[rowIndex][colIndex] !== "") {
                let val = data[rowIndex][colIndex].toString().replace(/[^0-9.-]+/g, "");
                return parseFloat(val) || 0;
            }
            return 0;
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(amount);
        };

        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyKnhktly5WvWrnxCEaQqh3L_exOwDX8jK9j8X4-U1SWDY0kJiR-BUOX69UQupt1k3i/exec';

        // The main function to fetch data from the Google Apps Script Web App
        async function fetchAndLoadData() {
            const statusBadge = document.getElementById('fileStatus');
            const syncIcon = document.getElementById('syncIcon');
            
            // Spin the icon and update badge
            syncIcon.classList.add('rotate-180');
            statusBadge.innerText = 'Syncing...';
            statusBadge.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-400 transition-colors duration-200';

            try {
                const response = await fetch(WEB_APP_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const returnData = await response.json();
                
                // Parse values from JSON summary (removing any dollar signs/commas if they still exist)
                const totalSavedStr = returnData.summary.totalSaved.toString().replace(/[^0-9.-]+/g, "");
                const tudorCostStr = returnData.summary.tudorCost.toString().replace(/[^0-9.-]+/g, "");
                const longinesCostStr = returnData.summary.longinesCost.toString().replace(/[^0-9.-]+/g, "");

                const totalSaved = parseFloat(totalSavedStr) || 0;
                const tudorCost = parseFloat(tudorCostStr) || 0;
                const longinesCost = parseFloat(longinesCostStr) || 0;

                chartDataCache = { totalSaved, tudorCost, longinesCost };

                updateDashboard(totalSaved, tudorCost, longinesCost, returnData.transactions);
                
                statusBadge.innerText = 'Live Data Synced';
                statusBadge.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-400 transition-colors duration-200';
                
            } catch (error) {
                statusBadge.innerText = 'Error loading data';
                statusBadge.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-400 transition-colors duration-200';
                console.error("Fetch Error:", error);
            } finally {
                // Reset icon spin
                setTimeout(() => syncIcon.classList.remove('rotate-180'), 500);
            }
        }

        // Handle Add Transaction Form Submit
        document.getElementById('addTransactionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const descInput = document.getElementById('descInput');
            const amountInput = document.getElementById('amountInput');
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitLoading = document.getElementById('submitLoading');
            const statusBadge = document.getElementById('fileStatus');

            const description = descInput.value.trim();
            const amount = parseFloat(amountInput.value);

            if (!description || isNaN(amount) || amount <= 0) return;

            // UI Loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            submitText.innerText = 'Saving...';
            submitLoading.classList.remove('hidden');
            
            statusBadge.innerText = 'Adding Entry...';
            statusBadge.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-indigo-100 dark:bg-indigo-900/30 text-indigo-800 dark:text-indigo-400 transition-colors duration-200';

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Apps Script requires this simple content type for CORS
                    body: JSON.stringify({ description: description, amount: amount })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // Clear form
                    descInput.value = '';
                    amountInput.value = '';
                    // Re-fetch data to update UI
                    fetchAndLoadData();
                } else {
                    throw new Error(result.message || 'Error occurred');
                }
            } catch (error) {
                console.error("Post Error:", error);
                statusBadge.innerText = 'Failed to Add';
                statusBadge.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-400 transition-colors duration-200';
            } finally {
                // Reset UI state
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                submitText.innerText = 'Add Funds';
                submitLoading.classList.add('hidden');
            }
        });

        // Handle Delete Transaction
        async function deleteTransaction(rowIndex) {
            if (!confirm("Are you sure you want to delete this specific transaction?")) return;

            const statusBadge = document.getElementById('fileStatus');
            const syncIcon = document.getElementById('syncIcon');
            
            statusBadge.innerText = 'Deleting...';
            statusBadge.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-400 transition-colors duration-200';
            syncIcon.classList.add('rotate-180');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'delete', rowIndex: rowIndex })
                });

                const result = await response.json();
                if (result.status === 'success') {
                    fetchAndLoadData();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Delete Error:", error);
                statusBadge.innerText = 'Delete Failed';
                setTimeout(() => syncIcon.classList.remove('rotate-180'), 500);
            }
        }

        // Handle Edit Transaction (Open Modal)
        function editTransaction(rowIndex, oldDesc, oldAmt) {
            currentEditRowIndex = rowIndex;
            
            const editDescInput = document.getElementById('editDescInput');
            const editAmountInput = document.getElementById('editAmountInput');
            const parsedOldAmt = parseFloat(oldAmt.toString().replace(/[^0-9.-]+/g, "")) || 0;

            editDescInput.value = oldDesc;
            editAmountInput.value = parsedOldAmt.toFixed(2); // Keep formatted to 2 decimals for input
            
            document.getElementById('editModal').classList.remove('hidden');
        }

        // Close Edit Modal
        document.getElementById('closeEditModalBtn').addEventListener('click', () => {
            document.getElementById('editModal').classList.add('hidden');
            currentEditRowIndex = null;
        });

        // Handle Edit Form Submit
        document.getElementById('editTransactionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (currentEditRowIndex === null) return;

            const newDesc = document.getElementById('editDescInput').value.trim();
            const newAmt = parseFloat(document.getElementById('editAmountInput').value);
            const saveBtn = document.getElementById('saveEditBtn');
            const saveText = document.getElementById('saveEditText');
            const saveLoading = document.getElementById('saveEditLoading');

            if (!newDesc || isNaN(newAmt) || newAmt <= 0) return;

            // UI Loading state
            saveBtn.disabled = true;
            saveBtn.classList.add('opacity-75', 'cursor-not-allowed');
            saveText.innerText = 'Saving...';
            saveLoading.classList.remove('hidden');

            const statusBadge = document.getElementById('fileStatus');
            const syncIcon = document.getElementById('syncIcon');
            
            statusBadge.innerText = 'Updating...';
            statusBadge.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-400 transition-colors duration-200';
            syncIcon.classList.add('rotate-180');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'edit', rowIndex: currentEditRowIndex, description: newDesc, amount: newAmt })
                });

                const result = await response.json();
                if (result.status === 'success') {
                    document.getElementById('editModal').classList.add('hidden');
                    currentEditRowIndex = null;
                    fetchAndLoadData();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Edit Error:", error);
                statusBadge.innerText = 'Edit Failed';
                statusBadge.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-400 transition-colors duration-200';
                setTimeout(() => syncIcon.classList.remove('rotate-180'), 500);
            } finally {
                // Reset Modal UI state
                saveBtn.disabled = false;
                saveBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                saveText.innerText = 'Save Changes';
                saveLoading.classList.add('hidden');
            }
        });

        // Load data on initial page load
        document.addEventListener('DOMContentLoaded', fetchAndLoadData);

        // Load data when the sync button is clicked
        document.getElementById('forceSyncBtn').addEventListener('click', fetchAndLoadData);

        function updateDashboard(totalSaved, tudorCost, longinesCost, fullData) {
            document.getElementById('dashboard').classList.remove('hidden');

            const tudorRemaining = Math.max(0, tudorCost - totalSaved);
            const longinesRemaining = Math.max(0, longinesCost - totalSaved);

            document.getElementById('totalSavedText').innerText = formatCurrency(totalSaved);
            document.getElementById('tudorCostText').innerText = formatCurrency(tudorRemaining);
            document.getElementById('longinesCostText').innerText = formatCurrency(longinesRemaining);

            const tudorPercent = Math.min((totalSaved / tudorCost) * 100, 100) || 0;
            const longinesPercent = Math.min((totalSaved / longinesCost) * 100, 100) || 0;
            
            document.getElementById('tudorProgressBar').style.width = `${tudorPercent}%`;
            document.getElementById('longinesProgressBar').style.width = `${longinesPercent}%`;

            updateChart(totalSaved, tudorCost, longinesCost);

            const tbody = document.getElementById('transactionTableBody');
            tbody.innerHTML = ''; 
            
            // Now fullData is the transactions array of objects from JSON
            for (let i = 0; i < fullData.length; i++) {
                const rowIndex = fullData[i].row; // Get exact spreadsheet row number
                const desc = fullData[i].description; 
                const amt = fullData[i].amount;  
                
                const formattedAmt = formatCurrency(parseFloat(amt.toString().replace(/[^0-9.-]+/g, "")) || 0);

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="py-3 px-4">${desc}</td>
                    <td class="py-3 px-4 text-right font-medium text-emerald-600 dark:text-emerald-500">${formattedAmt}</td>
                    <td class="py-3 px-4 text-right space-x-2">
                        <button onclick="editTransaction(${rowIndex}, '${desc.replace(/'/g, "\\'")}', '${amt}')" class="text-slate-400 hover:text-blue-500 transition-colors" title="Edit">
                            <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button onclick="deleteTransaction(${rowIndex})" class="text-slate-400 hover:text-red-500 transition-colors" title="Delete">
                            <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            }
        }

        function updateChart(totalSaved, tudorCost, longinesCost) {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const colors = getChartColors();
            
            if (progressChartInstance) {
                progressChartInstance.destroy();
            }

            Chart.defaults.color = colors.text;

            progressChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Tudor Goal', 'Longines Goal'],
                    datasets: [
                        {
                            label: 'Current Saved',
                            data: [totalSaved, totalSaved],
                            backgroundColor: '#10b981', 
                            borderRadius: 6,
                            barPercentage: 0.6
                        },
                        {
                            label: 'Target Cost',
                            data: [tudorCost, longinesCost],
                            backgroundColor: colors.targetBg, 
                            borderRadius: 6,
                            barPercentage: 0.6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y', 
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { display: false },
                            ticks: { color: colors.text }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: colors.text }
                        }
                    },
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: { color: colors.text }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + formatCurrency(context.raw);
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
